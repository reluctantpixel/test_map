<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visiting Researchers to Malta: Global Connections</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            overflow: hidden; 
        }
        
        .popup-title {
            font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #333;
            border-bottom: 2px solid #BA0C2F; /* UPDATED: UM Red line */
            padding-bottom: 3px;
        }
        .researcher-list { margin: 5px 0 0 0; padding-left: 20px; font-size: 13px; color: #555; list-style-type: disc;}
        .researcher-list li { margin-bottom: 4px; }

        /* NEW STYLES: Custom DivIcon for the Malta hub to hold PNG */
        .malta-icon-container {
            border-radius: 50%;
            background-color: #fff; 
            border: 2px solid #BA0C2F; 
            box-shadow: 0 0 5px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }
        
        .malta-icon-container img {
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            transform: scale(1.3); /* Adjust this number if you need more/less zoom */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@elfalem/leaflet-curve@0.9.2/dist/leaflet.curve.min.js"></script>
    
    <script>
        // 1. Map Initialization
        const map = L.map('map', {
            crs: L.CRS.Simple,
            zoomSnap: 0, // Keeps the zoom perfectly smooth for your iframe
            zoomControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false, keyboard: false, touchZoom: false
        });

        const imageUrl = 'World_map.svg'; 
        const imageBounds = [[0, 0], [1000, 1000]]; 

        L.imageOverlay(imageUrl, imageBounds).addTo(map);

        // Safely fit the full map into the iframe
        function frameMap() {
            map.invalidateSize(); // Wakes Leaflet up to check the real iframe size
            map.fitBounds(imageBounds); // Back to the original 1000x1000 full map
        }

        // Run it immediately, run it again a split-second later just in case, and listen for resizes
        frameMap();
        setTimeout(frameMap, 150);
        window.addEventListener('resize', frameMap);

        // NEW: A dedicated function to handle iframe sizing
        function frameMap() {
            map.invalidateSize(); // Forces Leaflet to recalculate the iframe's exact dimensions
            map.fitBounds(iframeBounds, { padding: [0, 0] }); // Forces the zoom with zero extra Leaflet padding
        }

        // 1. Run it immediately
        frameMap();

        // 2. Run it again a split-second later (Catch-all for slow iframe loading)
        setTimeout(frameMap, 150);

        // 3. Keep it perfect if the user resizes their browser window or rotates their phone
        window.addEventListener('resize', frameMap);

        // ==========================================
        // NEW: Map Layering setup (Putting lines behind dots)
        // ==========================================
        // Create custom "panes" to control z-index explicitely
        map.createPane('linesPane');
        map.getPane('linesPane').style.zIndex = 400; // Lower z-index
        
        map.createPane('markersPane');
        map.getPane('markersPane').style.zIndex = 450; // Higher z-index

        // 2. Global Variables
        const maltaCoords = [581, 516]; 
        let allCountryMarkers = []; 

        // UPDATED: Brand Styles using UM Red #BA0C2F
        const inactiveStyle = { 
            pane: 'markersPane', // Explicit pane assignment
            radius: 8, 
            fillColor: "#BA0C2F", // UPDATED: UM Red fill
            color: "#fff",       // UPDATED: Clean white border
            weight: 1, 
            opacity: 1, 
            fillOpacity: 0.8 
        };
        const activeStyle = { 
            pane: 'markersPane', // Explicit pane assignment
            radius: 10, 
            fillColor: "#fff",    // Highlighting by swapping color
            color: "#BA0C2F",    // UM Red border
            weight: 2, 
            opacity: 1, 
            fillOpacity: 1 
        };

        // 3. YOUR DATA
        const data = [
            {
                country: "United Kingdom",
                y: 780, x: 460, 
                researchers: ["Dr. Evelyn Brooks (History)", "Prof. Liam Smith (Marine Biology)"]
            },
            {
                country: "Italy",
                y: 607, x: 508, 
                researchers: ["Dr. Giovanni Rossi (Archaeology)", "Elena Bianchi (Seismology)"]
            },
            {
                country: "United States",
                y: 710, x: 200, 
                researchers: ["Prof. Sarah Jenkins (Digital Humanities)"]
            }
        ];

        // 4. Function: Draw the Curve
        function drawConnectionArc(origin, destination) {
            const start = origin; 
            const end = destination; 

            const deltaY = end[0] - start[0];
            const deltaX = end[1] - start[1];
            
            const cpY = start[0] + (deltaY / 2) + (Math.abs(deltaX) * 0.35); 
            const cpX = start[1] + (deltaX / 2) + (Math.abs(deltaY) * 0.1);
            
            const controlPoint = [cpY, cpX]; 

            const pathCommand = ['M', start, 'Q', controlPoint, end];

            return L.curve(pathCommand, {
                pane: 'linesPane', // Explicit pane assignment
                color: '#BA0C2F',  // UPDATED: UM Red lines
                weight: 1.5,
                opacity: 0.8,      // Softer default opacity
                fill: false,
                interactive: false  
            });
        }

        // 5. Build Markers, Draw Curves, and Add Interactivity
        data.forEach(item => {
            let popupContent = `<div class="popup-title">${item.country}</div>`;
            popupContent += `<ul class="researcher-list">`;
            item.researchers.forEach(researcher => { popupContent += `<li>${researcher}</li>`; });
            popupContent += `</ul>`;

            const originCoords = [item.y, item.x];

            const countryCurve = drawConnectionArc(originCoords, maltaCoords).addTo(map);

            // UPDATED: Dot Markers now receive explicit `pane: 'markersPane'` via style objects
            const marker = L.circleMarker(originCoords, inactiveStyle)
            .addTo(map)
            .bindPopup(popupContent, { offset: [0, -10], closeButton: false }); 

            marker.associatedCurve = countryCurve;
            allCountryMarkers.push(marker);

            marker.on('click', function(e) {
                L.DomEvent.stopPropagation(e); 

                allCountryMarkers.forEach(m => {
                    if (m === this) {
                        m.setStyle(activeStyle);
                        if (!map.hasLayer(m.associatedCurve)) m.associatedCurve.addTo(map);
                        m.associatedCurve.setStyle({ opacity: 0.9, weight: 2.5 }); 
                    } else {
                        m.setStyle(inactiveStyle);
                        if (map.hasLayer(m.associatedCurve)) map.removeLayer(m.associatedCurve); 
                    }
                });
            });
        });

        // ==========================================
        // NEW: Special Icon Marker for Malta Hub
        // ==========================================
        // Define a custom HTML 'DivIcon' rather than a basic vector dot
        const maltaHubIcon = L.divIcon({
            html: '<div class="malta-icon-container">' +
                  '' +
                  '<img src="um_square.jpg">' +
                  '</div>',
            iconSize: [20, 20], // Base size should be approx inactive size [16, 16] or slightly larger [20,20]
            className: '' // Clears Leaflet's default DivIcon styling
        });

        // Add Malta Hub Marker (Explicit Pane assigned in options)
        L.marker(maltaCoords, { 
            icon: maltaHubIcon, 
            pane: 'markersPane', 
            interactive: false 
        }).addTo(map);

        // 6. Map Background Click
        map.on('click', function(e) {
            allCountryMarkers.forEach(m => {
                m.setStyle(inactiveStyle);
                if (!map.hasLayer(m.associatedCurve)) m.associatedCurve.addTo(map); 
                m.associatedCurve.setStyle({ opacity: 0.3, weight: 1.5 });
            });
        });

        // 7. HELPER TOOL: Right-Click coordinates
        map.on('contextmenu', function(e) { 
            let clickedY = Math.round(e.latlng.lat);
            let clickedX = Math.round(e.latlng.lng);
            L.popup().setLatLng(e.latlng).setContent(`y: ${clickedY}, x: ${clickedX}`).openOn(map);
            console.log(`y: ${clickedY}, x: ${clickedX}`);
        });

    </script>
</body>
</html>
