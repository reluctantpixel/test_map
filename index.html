<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visiting Researchers to Malta: Global Connections</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            overflow: hidden;
            position: relative;
        }

        /* 16:9 Widescreen Container Setup */
        #map-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #map-container svg {
            width: 100%;
            height: 100%;
            object-fit: fill; /* Matches your explicit 16:9 layout boundaries */
        }

        /* Vector Line & Node Layout Styles */
        .connection-line {
            fill: none;
            stroke: #BA0C2F;
            stroke-width: 1.5;
            opacity: 0.8;
            transition: all 0.3s ease;
        }
        .connection-line.active {
            opacity: 0.9;
            stroke-width: 2.5;
        }

        .marker-dot {
            fill: #BA0C2F;
            stroke: #fff;
            stroke-width: 1.5;
            opacity: 1;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .marker-dot.active {
            fill: #fff;
            stroke: #BA0C2F;
            stroke-width: 2.5;
            opacity: 1;
        }

        /* Context Information Window */
        #info-popup {
            position: absolute;
            display: none;
            background: white;
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 1000;
            max-width: 250px;
            max-height: 60vh;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        
        /* Coordinate Floating Label Style */
        #coord-helper {
            position: absolute;
            display: none;
            background: #333;
            color: #fff;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 1010;
        }

        .popup-title {
            font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #333;
            border-bottom: 2px solid #BA0C2F; 
            padding-bottom: 3px;
        }
        .researcher-list { margin: 5px 0 0 0; padding-left: 20px; font-size: 13px; color: #555; list-style-type: disc;}
        .researcher-list li { margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="map-container"></div>
    <div id="info-popup"></div>
    <div id="coord-helper"></div>

    <script>
        // Malta anchor coordinates are now based on the actual World_map.svg coordinate system.
        const maltaCoords = { x: 432, y: 191 };

        // Placeholder positions adjusted for the SVG map layout.
        const data = [
            {
                country: "Iceland",
                x: 460, y: 120, 
                researchers: ["Prof. Thomas P. Runarsson, University of Iceland (2014)", "Josh Bayer, Game Designer EVE Online, CCP (2026)"]
            },
            {
                country: "Portugal",
                x: 460, y: 120, 
                researchers: ["Dr Carlos Martinho, INESC-ID (2014)"]
            },
            {
                country: "France",
                x: 460, y: 120, 
                researchers: ["Prof. Jean Claude Martin, Paris South University (2013)", "Gabriel Robert, Lead Programmer Ubisoft (2019)", ]
            },
            {
                country: "Denmark",
                x: 460, y: 120, 
                researchers: ["Prof. Mark Grimshaw, Aalborg University", "Christoffer Pedersen Holmgaard, IT University of Copenhagen (2014)", "Antonios Liapis, IT University of Copenhagen (2013)", "Aksel Køie, CEO Step In Books (2016)"]
            },
            {
                country: "Netherlands",
                x: 460, y: 120, 
                researchers: ["Eva A. Alblas, Radboud University of Nijmegen (2015)"]
            },
            {
                country: "Norway",
                x: 460, y: 120, 
                researchers: ["Dr Jaroslav Svelch, University of Bergen", "Dr Dom Ford, University of Bergen"]
            },
            {
                country: "Spain",
                x: 460, y: 120, 
                researchers: ["Dr Ricardo Chalmeta from Universidad Jaume I de Castellón (2018)"]
            },
            {
                country: "Ireland",
                x: 460, y: 120, 
                researchers: ["Prof. Aphra Kerr, University College Dublin", "Nicholas Ward, University of Limerick (2014)"]
            },
            {
                country: "Canada",
                x: 460, y: 120, 
                researchers: ["Claire Dormann, Ottawa University (2014)"]
            },
            {
                country: "Sweden",
                x: 460, y: 120, 
                researchers: ["Michelle Westerlaken, Malmö University (2017)"]
            },
            {
                country: "England",
                x: 460, y: 120, 
                researchers: ["Prof. Alan Meades, Canterbury Christ Church University", "Mike Cook, University of Falmouth's Games Academy (2018)", "Cristiana Pacheco, Queen Mary University (2020)", "Jon Gibson, Studio Head, Electric Square", "Nathan Gouveia, Studio Production Director, Electric Square",
                             "Meg Jayanth, award-winning games writer (2016)", "Emily Short, Award-winning IF Writer", "Alexis Kennedy, CEO and Designer, Failbetter Games", "Rob Morgan, Games Writer and Creative Director of Playlines AR",
                             "Mink Ette, Escape Room Designer" ]
            },
            {
                country: "Belgium",
                x: 460, y: 120, 
                researchers: ["Nele van de Mosselaer, University of Antwerp (2018, 2020)"]
            },
            {
                country: "Slovakia",
                x: 460, y: 120, 
                researchers: ["Ivan Rokošný, Trnava University (2018)", "Jan Proner, Trnava University (2018)"]
            },
            {
                country: "Arizona",
                x: 460, y: 120, 
                researchers: ["Theresa Devine Fulbright Scholar Arizona State University (2021)"]
            },

            {
                country: "Texas",
                x: 460, y: 120, 
                researchers: ["Yvoni Galetaki, GGTTX School of Texas (2024)"]
            },
            {
                country: "Brazil",
                x: 460, y: 120, 
                researchers: ["Mario Madureira Fontes, Pontifical Catholic University (2015)", "Ana Laura Torquato, Universidade Federal de Goiás (2024)" ]
            },
            {
                country: "Poland",
                x: 460, y: 120, 
                researchers: ["Patryk Grzeszcuk, Marketing Director, 11Bit Studios", "Tomasz Kisiliewicz, Art Director, 11Bit Studios", "Maciej Binkowsky, Lead Game Designer, Techland",
                             "Kasia Redesiuk, Art Director, CD Projekt Red" ]
            },
            
            {
                country: "Italy",
                x: 427, y: 167, 
                researchers: ["Sara Cuccu, Università degli Studi di Cagliari (2021)", "Daniele Monaco, Universita' degli Studi di Perugia (2023-4)", "Giulio Cellura, Università degli Studi di Palermo (2024)",
                             "Fulio Bragoni Fabrizio, Università degli Studi di Palermo (2024)", "Marco Imperatore, University of Bari Aldo Moro (2025)" ]
            },
            {
                country: "Palestine",
                x: 200, y: 190, 
                researchers: ["Rasheed Abueideh, Designer Liyla and the Shadows of War (2024)"]
            },
            {
                country: "Finland",
                x: 200, y: 190, 
                researchers: ["Kari Koivistoinen, Senior Producer MachineGames (2020)"]
            },
        ];

        fetch('World_map.svg')
            .then(response => response.text())
            .then(svgText => {
                const container = document.getElementById('map-container');
                container.innerHTML = svgText;
                
                const svg = container.querySelector('svg');
                const svgViewBox = svg.viewBox.baseVal;
                const mapWidth = svgViewBox && svgViewBox.width ? svgViewBox.width : 873;
                const mapHeight = svgViewBox && svgViewBox.height ? svgViewBox.height : 491;

                // Use the actual World_map.svg canvas as the source of truth for size and resolution.
                svg.setAttribute('viewBox', `0 0 ${mapWidth} ${mapHeight}`);
                svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                svg.setAttribute('width', String(mapWidth));
                svg.setAttribute('height', String(mapHeight));

                const maltaMapCoords = { x: maltaCoords.x, y: maltaCoords.y };
                const mapData = data.map(item => ({ ...item }));

                const popup = document.getElementById('info-popup');
                const coordHelper = document.getElementById('coord-helper');
                let activeElements = null;

                const svgPointFromClient = (clientX, clientY) => {
                    const point = svg.createSVGPoint();
                    point.x = clientX;
                    point.y = clientY;
                    return point.matrixTransform(svg.getScreenCTM().inverse());
                };

                const screenPointFromSvg = (svgX, svgY) => {
                    const point = svg.createSVGPoint();
                    point.x = svgX;
                    point.y = svgY;
                    return point.matrixTransform(svg.getScreenCTM());
                };

                // Loop through data and build vector objects natively
                mapData.forEach(item => {
                    const deltaX = maltaMapCoords.x - item.x;
                    const deltaY = maltaMapCoords.y - item.y;
                    const cpX = item.x + (deltaX / 2) + (Math.abs(deltaY) * 0.1);
                    const cpY = item.y + (deltaY / 2) + (Math.abs(deltaX) * 0.35);

                    // Curves
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${item.x} ${item.y} Q ${cpX} ${cpY} ${maltaMapCoords.x} ${maltaMapCoords.y}`);
                    path.setAttribute('class', 'connection-line');
                    svg.appendChild(path);

                    // Dots
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', item.x);
                    circle.setAttribute('cy', item.y);
                    circle.setAttribute('r', '8');
                    circle.setAttribute('class', 'marker-dot');
                    svg.appendChild(circle);

                    circle.addEventListener('click', (e) => {
                        if (e.button !== 0) return; // ignore right-click / auxiliary clicks

                        e.stopPropagation();
                        coordHelper.style.display = 'none'; // Hide coordinate tool on regular tap

                        if (activeElements) {
                            activeElements.circle.classList.remove('active');
                            activeElements.path.classList.remove('active');
                            activeElements.circle.setAttribute('r', '8');
                        }

                        circle.classList.add('active');
                        path.classList.add('active');
                        circle.setAttribute('r', '10');
                        activeElements = { circle, path };

                        let popupHTML = `<div class="popup-title">${item.country}</div><ul class="researcher-list">`;
                        item.researchers.forEach(r => popupHTML += `<li>${r}</li>`);
                        popupHTML += `</ul>`;
                        
                        popup.innerHTML = popupHTML;
                        popup.style.display = 'block';

                        const markerScreen = screenPointFromSvg(item.x, item.y);
                        popup.style.left = (markerScreen.x + 15) + 'px';
                        popup.style.top = (markerScreen.y - 20) + 'px';
                    });
                });

                // Re-add the Malta hub icon as an SVG image overlay.
                const maltaHubIcon = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                maltaHubIcon.setAttribute('href', 'um_square.jpg');
                maltaHubIcon.setAttribute('x', String(maltaMapCoords.x - 10));
                maltaHubIcon.setAttribute('y', String(maltaMapCoords.y - 10));
                maltaHubIcon.setAttribute('width', '20');
                maltaHubIcon.setAttribute('height', '20');
                maltaHubIcon.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                maltaHubIcon.style.pointerEvents = 'none';
                svg.appendChild(maltaHubIcon);

                // Draw central Malta anchor node on top of the image.
                const maltaCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                maltaCircle.setAttribute('cx', maltaMapCoords.x);
                maltaCircle.setAttribute('cy', maltaMapCoords.y);
                maltaCircle.setAttribute('r', '11');
                maltaCircle.setAttribute('fill', 'transparent');
                maltaCircle.setAttribute('stroke', '#BA0C2F');
                maltaCircle.setAttribute('stroke-width', '3');
                svg.appendChild(maltaCircle);

                // HELPER TOOL: Native SVG Coordinate Calculator on Right Click
                svg.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    popup.style.display = 'none';

                    const nativeSvgSpace = svgPointFromClient(e.clientX, e.clientY);
                    const gridX = Math.round(nativeSvgSpace.x);
                    const gridY = Math.round(nativeSvgSpace.y);
                    const tooltipScreen = screenPointFromSvg(gridX, gridY);

                    // Render coordinate tooltip at the same SVG point the numbers refer to.
                    coordHelper.innerHTML = `x: ${gridX}, y: ${gridY}`;
                    coordHelper.style.display = 'block';
                    coordHelper.style.left = (tooltipScreen.x + 12) + 'px';
                    coordHelper.style.top = (tooltipScreen.y - 12) + 'px';
                });

                // Map Reset Action Mapping
                svg.addEventListener('click', (e) => {
                    if (e.button === 2) return; // keep the coordinate helper visible on right-click

                    if (activeElements) {
                        activeElements.circle.classList.remove('active');
                        activeElements.path.classList.remove('active');
                        activeElements.circle.setAttribute('r', '8');
                        activeElements = null;
                    }
                    popup.style.display = 'none';
                    coordHelper.style.display = 'none';
                });
            });
    </script>
</body>
</html>
